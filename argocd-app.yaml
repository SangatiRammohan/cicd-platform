apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cicd-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SangatiRammohan/cicd-platform-gitops.git
    targetRevision: HEAD
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: cicd-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true