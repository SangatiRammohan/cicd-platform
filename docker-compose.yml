version: '3.8'

services:
  app:
    build:
      context: .
      target: runner       # build only up to the runner stage
    image: express-app:local
    container_name: express-app
    ports:
      - "3000:3000"         # host:container
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=info
      - APP_NAME=express-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s